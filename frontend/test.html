<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,14,28,0.97); backdrop-filter: blur(16px);

    padding: 0 20px; height: 58px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--white); text-decoration: none; display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
  .logo-icon { width: 26px; height: 26px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 800; color: var(--navy); }
  .logo span { color: var(--gold); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .timer { font-family: 'DM Mono', monospace; font-size: 0.95rem; color: var(--white); background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 6px 14px; border-radius: 8px; min-width: 70px; text-align: center; font-weight: 500; }
  .timer.warning { color: var(--red); border-color: rgba(248,113,113,0.3); }
  .q-count { font-family: 'Syne', sans-serif; font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

  .progress-wrap { height: 4px; background: rgba(255,255,255,0.05); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width 0.35s ease; }

  .course-tag-bar { padding: 12px 20px; background: var(--navy-mid); border-bottom: 1px solid var(--border); }
  .course-tag { display: inline-flex; align-items: center; gap: 8px; background: var(--gold-dim); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-family: 'Syne', sans-serif; font-size: 0.72rem; color: var(--gold); font-weight: 600; }

  .test-main { padding: 24px 20px 120px; max-width: 680px; margin: 0 auto; }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
  .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }

  .loading-text { font-family: 'Syne', sans-serif; font-size: 0.82rem; color: var(--muted); }

  .q-num { font-family: 'Syne', sans-serif; font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 12px; }
  .q-text { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; line-height: 1.5; margin-bottom: 24px; color: var(--white); }

  .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .option {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 16px; border: 1.5px solid var(--border);
    border-radius: 14px; cursor: pointer; background: var(--navy-card);
    transition: all 0.15s; user-select: none; min-height: 60px;
  }
  .option:active { transform: scale(0.99); }
  .option.selected { border-color: var(--gold); background: var(--gold-dim); }

  .opt-letter {
    width: 36px; height: 36px; border-radius: 10px; border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700; color: var(--muted);
    flex-shrink: 0; transition: all 0.15s;

  .opt-text { font-size: 0.92rem; color: var(--white); line-height: 1.45; font-weight: 300; flex: 1; }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(8,14,28,0.98); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    display: flex; gap: 12px; align-items: center; z-index: 100;
  }
  .btn-prev { flex: 1; background: transparent; border: 1.5px solid var(--border); color: var(--muted); padding: 14px; border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; }
  .btn-prev:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-next { flex: 2; background: var(--gold); color: var(--navy); border: none; padding: 14px; border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 0.92rem; font-weight: 800; cursor: pointer; box-shadow: 0 4px 16px rgba(201,168,76,0.25); }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-next:not(:disabled):active { transform: scale(0.98); }

  .q-map { display: none; }
  @media (min-width: 768px) {
    .topbar { padding: 0 48px; height: 64px; }
    .test-main { padding: 40px 48px 120px; }
    .q-text { font-size: 1.2rem; }
    .option { padding: 20px; }
    .bottom-nav { padding: 20px 48px; }
    .q-map { display: flex; position: fixed; right: 20px; top: 50%; transform: translateY(-50%); flex-direction: column; gap: 5px; z-index: 50; }
    .q-dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.1); cursor: pointer; transition: all 0.2s; }
    .q-dot.answered { background: var(--gold); }
    .q-dot.current { background: var(--gold-light); box-shadow: 0 0 6px var(--gold); }
  }

// ── COURSE CONFIG ─────────────────────────────────────────
const courseIcons = {
  java:'☕', cpp:'⚙️', excel:'📊', basics:'💻',
  python:'🐍', sql:'🗄️', html:'🌐', digital:'📱',
  tally:'📒', datascience:'🤖'
};

const courseNames = {
  java:'Java Programming', cpp:'C++ Programming',
  excel:'Microsoft Excel', basics:'Computer Basics',
  python:'Python Programming', sql:'SQL & Databases',
  html:'HTML & CSS', digital:'Digital Marketing',
  tally:'Tally & Accounting', datascience:'Data Science Basics'
};

// ── INIT ──────────────────────────────────────────────────
let student = {};
try { student = JSON.parse(sessionStorage.getItem('student') || '{}'); } catch(e){}
let course = student.course || 'java';
let questions = QUESTIONS[course] || QUESTIONS.java;
let currentQ = 0;
let answers = new Array(questions.length).fill(-1);
let secondsLeft = 2700; // 45 mins for all courses
let timerInterval;

window.onload = function() {
  document.getElementById('courseTag').textContent = (courseIcons[course] || '📚') + ' ' + (courseNames[course] || course);
  setTimeout(() => {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('testContent').style.display = 'block';
    buildMap();
    renderQ();
    startTimer();
  }, 1200);
};

function buildMap() {
  const map = document.getElementById('qMap');
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'q-dot' + (i===0?' current':'');
    d.id = 'dot-'+i;
    d.title = 'Q'+(i+1);
    d.onclick = () => goTo(i);
    map.appendChild(d);
  });
}

function renderQ() {
  const q = questions[currentQ];
  const total = questions.length;
  document.getElementById('qNum').textContent = `Question ${currentQ+1} of ${total}`;
  document.getElementById('qCount').textContent = `Q ${currentQ+1}/${total}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressFill').style.width = ((currentQ+1)/total*100)+'%';

  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  ['A','B','C','D'].forEach((letter, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answers[currentQ]===i?' selected':'');
    div.onclick = () => pick(i);
    div.innerHTML = `<div class="opt-letter">${letter}</div><div class="opt-text">${q.opts[i]}</div>`;
    list.appendChild(div);
  });

  document.getElementById('prevBtn').disabled = currentQ === 0;
  const nb = document.getElementById('nextBtn');
  nb.textContent = currentQ === total-1 ? 'Submit Test →' : 'Next →';
  nb.disabled = answers[currentQ] === -1;

  document.querySelectorAll('.q-dot').forEach((d,i) => {
    d.className = 'q-dot'+(i===currentQ?' current':answers[i]>-1?' answered':'');
  });
  window.scrollTo(0,0);
}

function pick(idx) { answers[currentQ]=idx; renderQ(); }
function nextQ() { if(currentQ<questions.length-1){currentQ++;renderQ();}else submitTest(); }
function prevQ() { if(currentQ>0){currentQ--;renderQ();} }
function goTo(i) { currentQ=i; renderQ(); }

function startTimer() {
  timerInterval = setInterval(() => {
    secondsLeft--;
    const m = Math.floor(secondsLeft/60);
    const s = secondsLeft%60;
    const el = document.getElementById('timer');
    el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(secondsLeft<=300) el.classList.add('warning');
    if(secondsLeft<=0){clearInterval(timerInterval);submitTest();}
  },1000);
}

function submitTest() {
  clearInterval(timerInterval);
  let correct = 0;
  questions.forEach((q,i)=>{if(answers[i]===q.ans)correct++;});
  const score = Math.round((correct/questions.length)*100);
  sessionStorage.setItem('result', JSON.stringify({
    score, correct, total:questions.length, passed:score>=70,
    course, courseName:courseNames[course],
    name:student.name, email:student.email
  }));
  window.location.href = 'result.html';
}
</script>
